<script>
  // GitHub Pages 404 trick: preservar ruta hash al redirigir
  var path = location.pathname;
  var base = path.split('/').slice(0, 2).join('/');
  var hash = path.slice(base.length + 1).replace(/\//g, '-');
  location.replace(base + '/' + (hash ? '#/' + hash : ''));
</script>
</head>
